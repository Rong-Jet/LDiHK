version = 1
name = "LDiHK"

[setup]
script = ""

[setup.darwin]
script = '''
cd "$CODEX_WORKTREE_PATH"

if ! command -v uv >/dev/null 2>&1; then
  python3 -m pip install --user uv
  export PATH="$HOME/.local/bin:$PATH"
fi

uv sync --cache-dir .uv-cache
mkdir -p data/processed/users/local_user
'''

[cleanup]
script = ""

[cleanup.darwin]
script = '''
cd "$CODEX_WORKTREE_PATH"

rm -rf .uv-cache .pytest_cache .mypy_cache .ruff_cache
find . -type d -name "__pycache__" -prune -exec rm -rf {} +
'''

[[actions]]
name = "Test backend"
icon = "tool"
command = "uv --cache-dir .uv-cache run python -m unittest discover -s backend/tests"
platform = "darwin"

[[actions]]
name = "Run API"
icon = "tool"
command = "uv --cache-dir .uv-cache run flask --app backend.app run --port 5055"

[[actions]]
name = "Process local YouTube export"
icon = "tool"
command = "uv --cache-dir .uv-cache run python backend/scripts/process_youtube_usage.py"
